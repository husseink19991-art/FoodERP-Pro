services:
  nginx:
    image: nginx:1.27-alpine
    container_name: fooderp_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - fooderp-network
    restart: unless-stopped

  backend:
    # For local development, use build. For production, use image from GHCR
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    # Uncomment below to use pre-built image from GHCR (production)
    # image: ghcr.io/husseink1991/fooderp-pro/backend:latest
    container_name: fooderp_backend
    env_file:
      - .env.docker
    volumes:
      - ../backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 8000) ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - fooderp-network
    restart: unless-stopped

  frontend:
    # For local development, use build. For production, use image from GHCR
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    # Uncomment below to use pre-built image from GHCR (production)
    # image: ghcr.io/husseink1991/fooderp-pro/frontend:latest
    container_name: fooderp_frontend
    env_file:
      - .env.docker
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Check liveness probe first, then deep health check after startup
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health?probe=live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - fooderp-network
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: fooderp_db
    env_file:
      - .env.docker
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME} -p${DB_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - fooderp-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fooderp_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - fooderp-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  fooderp-network:
    driver: bridge
